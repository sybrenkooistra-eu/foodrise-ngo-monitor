name: FoodRise Newsletter

on:
  schedule:
    - cron: "30 5 * * 2"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser anthropic

      - name: Restore seen_items cache
        uses: actions/cache@v4
        with:
          path: seen_items.json
          key: seen-items-${{ github.run_id }}
          restore-keys: |
            seen-items-

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
        run: python3 scraper.py

      - name: Commit updated seen_items.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_items.json
          git diff --staged --quiet || git commit -m "Update seen_items.json [skip ci]"
          git push
